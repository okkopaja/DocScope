services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docscope-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docscope
      POSTGRES_PASSWORD: docscope
      POSTGRES_DB: docscope
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docscope -d docscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
